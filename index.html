<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Product Preview Card Component - Frontend Mentor Challenge">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Product Preview Card Component</title>

  <!-- CSS Reset -->
  <link rel="stylesheet" href="reset.css">
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main>
    <!-- Your component content goes here -->
    <article>
      <picture>
        <source media="(max-width: 767px)" srcset="./images/image-product-mobile.jpg">
        <img src="./images/image-product-desktop.jpg" alt="Perfume">
      </picture>
      <div class="card__content">
        <p class="card__content__subtitle">PERFUME</p>
        <h1 class="card__content__title">Gabrielle Essence Eau De Parfum</h1>
        <p class="card__content__description">A floral, solar and voluptuous interpretation composed by Olivier Polge,
          Perfumer-Creator for the House of CHANEL.</p>
        <div class="card__content__price">
          <span class="card__content__price--new">$149.99</span>
          <span class="card__content__price--old">$169.99</span>
        </div>
        <button class="card__content__btn">
          <span class="card__content__btn__icon">
            <img src="./images/icon-cart.svg" alt="">
          </span>
          <span class="card__content__btn__text">Add to Cart</span>
        </button>
      </div>
    </article>
  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
      rel="noopener noreferrer">Frontend Mentor</a>.
    Coded by <a href="https://github.com/nara-md" target="_blank" rel="noopener noreferrer">Nara Mendes</a>.
  </footer>

</body>

</html>
